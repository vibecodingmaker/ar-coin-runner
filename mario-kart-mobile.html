<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mario Kart Mobile 🏎️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
            margin-bottom: 10px;
            font-size: clamp(1.5em, 5vw, 3em);
            letter-spacing: 2px;
            text-align: center;
            padding: 0 10px;
        }

        #gameContainer {
            position: relative;
            border: 4px solid #e94560;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5), inset 0 0 30px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 100%;
            max-height: 70vh;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: white;
            font-size: clamp(14px, 3vw, 18px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .ui-box {
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        #controls {
            margin-top: 15px;
            color: white;
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            width: 95%;
            max-width: 400px;
        }

        #controls h3 {
            color: #e94560;
            margin-bottom: 8px;
            font-size: clamp(12px, 3vw, 16px);
        }

        .key {
            display: inline-block;
            background: linear-gradient(145deg, #333, #555);
            padding: 5px 10px;
            margin: 2px;
            border-radius: 5px;
            border: 1px solid #777;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: clamp(10px, 2.5vw, 14px);
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        #startScreen h2 {
            color: #e94560;
            font-size: clamp(2em, 7vw, 4em);
            margin-bottom: 20px;
            text-shadow: 0 0 20px #e94560;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #startBtn {
            padding: 15px 40px;
            font-size: clamp(1em, 3vw, 1.5em);
            background: linear-gradient(145deg, #e94560, #c23a51);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.5);
            transition: all 0.3s;
        }

        #startBtn:active {
            transform: translateY(-2px);
            box-shadow: 0 3px 15px rgba(233, 69, 96, 0.5);
        }

        #speedometer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
            border-radius: 50%;
            border: 3px solid #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            z-index: 10;
        }

        #minimap {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #e94560;
            border-radius: 10px;
            z-index: 10;
        }

        /* Touch Controls */
        #touchControls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            display: none;
            z-index: 15;
            pointer-events: none;
        }

        #touchControls.visible {
            display: flex;
        }

        .touch-zone {
            pointer-events: auto;
        }

        #steerLeft, #steerRight {
            width: 50%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: rgba(255, 255, 255, 0.5);
            transition: background 0.1s;
        }

        #steerLeft:active, #steerRight:active, #steerLeft.active, #steerRight.active {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
            color: #e94560;
        }

        #steerLeft {
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        #accel {
            width: 50%;
            height: 100%;
            background: rgba(233, 69, 96, 0.1);
            border: 2px solid rgba(233, 69, 96, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: rgba(233, 69, 96, 0.5);
            transition: background 0.1s;
        }

        #accel:active, #accel.active {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
            color: #e94560;
        }

        #driftHint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #e94560;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 25;
            display: none;
            text-align: center;
        }

        #driftHint.visible {
            display: block;
        }

        /* Pause button */
        #pauseBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px;
            font-size: 24px;
            background: rgba(233, 69, 96, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 30;
        }

        /* Mobile controls indicator */
        @media (max-width: 768px) {
            #controls {
                display: none;
            }

            #touchControls {
                display: flex;
            }
        }

        @media (min-width: 769px) {
            #touchControls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <h1>🏎️ KART RACER 3D 🏎️</h1>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="ui-box">
                <div>LAP: <span id="lap">1</span>/3</div>
                <div>POS: <span id="position">1</span>/8</div>
            </div>
            <div class="ui-box">
                <div>TIME: <span id="time">0:00.00</span></div>
            </div>
        </div>
        <canvas id="speedometer"></canvas>
        <canvas id="minimap"></canvas>

        <div id="startScreen">
            <h2>🏁 KART RACER 🏁</h2>
            <p style="color: white; margin-bottom: 20px; font-size: clamp(12px, 3vw, 1.2em); text-align: center; padding: 0 20px;">Touch controls: Tap sides to steer, tap bottom to accelerate</p>
            <button id="startBtn">START RACE</button>
        </div>

        <button id="pauseBtn">⏸️</button>
    </div>

    <div id="controls">
        <h3>Controls</h3>
        <p>
            <span class="key">↑</span> Accelerate &nbsp;
            <span class="key">↓</span> Brake/Reverse &nbsp;
            <span class="key">←</span> <span class="key">→</span> Steer &nbsp;
            <span class="key">SPACE</span> Drift
        </p>
        <p style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;">Touch controls for mobile</p>
    </div>

    <div id="touchControls">
        <div id="steerLeft" class="touch-zone">◀</div>
        <div id="accel" class="touch-zone">▲</div>
        <div id="steerRight" class="touch-zone">▶</div>
    </div>

    <div id="driftHint">💨 DRIFT! TAP ▲</div>

    <script>
        // Canvas Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedoCanvas = document.getElementById('speedometer');
        const speedoCtx = speedoCanvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');

        // Resize canvas to fit container
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const aspectRatio = 1000 / 600;
            const maxWidth = container.clientWidth;
            const maxHeight = container.clientHeight || window.innerHeight * 0.6;

            if (maxWidth / maxHeight > aspectRatio) {
                canvas.height = maxHeight;
                canvas.width = maxHeight * aspectRatio;
            } else {
                canvas.width = maxWidth;
                canvas.height = maxWidth / aspectRatio;
            }

            canvas.style.width = canvas.width + 'px';
            canvas.style.height = canvas.height + 'px';
        }

        // Game State
        let gameRunning = false;
        let startTime = 0;
        let lap = 1;
        let maxLaps = 3;
        let isPaused = false;

        // Touch controls state
        const touchState = {
            left: false,
            right: false,
            up: false
        };

        // Track Definition
        const track = {
            width: 400,
            innerRadius: 150,
            outerRadius: 550,
            checkpoints: [],
            trees: [],
            decorations: []
        };

        // Generate track checkpoints
        for (let i = 0; i < 360; i += 10) {
            const angle = (i * Math.PI) / 180;
            track.checkpoints.push({
                x: 500 + Math.cos(angle) * 350,
                y: 500 + Math.sin(angle) * 350,
                angle: angle
            });
        }

        // Generate trees around track
        for (let i = 0; i < 50; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 650 + Math.random() * 200;
            track.trees.push({
                x: 500 + Math.cos(angle) * dist,
                y: 500 + Math.sin(angle) * dist,
                height: 30 + Math.random() * 40,
                color: `hsl(${100 + Math.random() * 40}, 60%, ${30 + Math.random() * 20}%)`
            });
        }

        // Kart Class
        class Kart {
            constructor(x, y, color, isPlayer = false, name = "Player") {
                this.x = x;
                this.y = y;
                this.angle = -Math.PI / 2;
                this.speed = 0;
                this.maxSpeed = isPlayer ? 12 : 10 + Math.random() * 3;
                this.acceleration = 0.3;
                this.friction = 0.96;
                this.turnSpeed = 0.08;
                this.color = color;
                this.isPlayer = isPlayer;
                this.name = name;
                this.width = 20;
                this.height = 30;
                this.driftFactor = 0;
                this.checkpointIndex = 0;
                this.lap = 1;
                this.finished = false;
                this.exhaustParticles = [];
                this.z = 0;
                this.vz = 0;
                this.wheelRotation = 0;
            }

            update(keys) {
                if (!this.isPlayer) {
                    this.aiUpdate();
                    return;
                }

                if (keys['ArrowUp'] || touchState.up) {
                    this.speed += this.acceleration;
                }
                if (keys['ArrowDown']) {
                    this.speed -= this.acceleration;
                }

                const turnAmount = this.turnSpeed * (this.speed / this.maxSpeed);
                if (Math.abs(this.speed) > 0.1) {
                    if (keys['ArrowLeft'] || touchState.left) {
                        this.angle -= turnAmount;
                        this.wheelRotation = -0.5;
                    } else if (keys['ArrowRight'] || touchState.right) {
                        this.angle += turnAmount;
                        this.wheelRotation = 0.5;
                    } else {
                        this.wheelRotation *= 0.9;
                    }
                }

                if (keys[' '] && Math.abs(this.speed) > 5) {
                    this.driftFactor = Math.min(this.driftFactor + 0.05, 0.8);
                    this.angle += (Math.random() - 0.5) * 0.1 * this.driftFactor;
                    this.addExhaustParticle(3);
                    document.getElementById('driftHint').classList.add('visible');
                } else {
                    this.driftFactor *= 0.9;
                }

                this.speed *= this.friction;
                this.speed = Math.max(-this.maxSpeed * 0.5, Math.min(this.maxSpeed, this.speed));

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                const centerX = 500;
                const centerY = 500;
                const distFromCenter = Math.sqrt((this.x - centerX) ** 2 + (this.y - centerY) ** 2);

                if (distFromCenter < track.innerRadius || distFromCenter > track.outerRadius) {
                    this.speed *= 0.7;
                    this.addExhaustParticle(1);
                }

                this.updateExhaust();
                this.wheelRotation += this.speed * 0.1;
                this.checkProgress();
            }

            aiUpdate() {
                const target = track.checkpoints[this.checkpointIndex];
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const targetAngle = Math.atan2(dy, dx);

                let angleDiff = targetAngle - this.angle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                this.angle += Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), this.turnSpeed);
                this.speed += this.acceleration * 0.8;
                this.speed *= this.friction;
                this.speed = Math.min(this.speed, this.maxSpeed);

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                this.checkProgress();
                this.updateExhaust();
                this.wheelRotation += this.speed * 0.1;
            }

            checkProgress() {
                const target = track.checkpoints[this.checkpointIndex];
                const dist = Math.sqrt((this.x - target.x) ** 2 + (this.y - target.y) ** 2);

                if (dist < 50) {
                    this.checkpointIndex = (this.checkpointIndex + 1) % track.checkpoints.length;
                    if (this.checkpointIndex === 0) {
                        this.lap++;
                        if (this.isPlayer && this.lap > lap) {
                            lap = this.lap;
                            document.getElementById('lap').textContent = lap;
                        }
                    }
                }
            }

            addExhaustParticle(count = 1) {
                for (let i = 0; i < count; i++) {
                    this.exhaustParticles.push({
                        x: this.x - Math.cos(this.angle) * 15,
                        y: this.y - Math.sin(this.angle) * 15,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2,
                        life: 30,
                        maxLife: 30,
                        size: 3 + Math.random() * 3
                    });
                }
            }

            updateExhaust() {
                if (Math.abs(this.speed) > 1 && Math.random() < 0.3) {
                    this.addExhaustParticle();
                }

                this.exhaustParticles = this.exhaustParticles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    return p.life > 0;
                });
            }

            draw(ctx, cameraX, cameraY) {
                const screenX = this.x - cameraX + canvas.width / 2;
                const screenY = this.y - cameraY + canvas.height / 2;

                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + 5, 15, 20, this.angle, 0, Math.PI * 2);
                ctx.fill();

                this.exhaustParticles.forEach(p => {
                    const px = p.x - cameraX + canvas.width / 2;
                    const py = p.y - cameraY + canvas.height / 2;
                    const alpha = p.life / p.maxLife;
                    ctx.fillStyle = `rgba(150, 150, 150, ${alpha * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(px, py, p.size * (2 - alpha), 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.save();
                ctx.translate(screenX, screenY);
                ctx.rotate(this.angle);

                const gradient = ctx.createLinearGradient(-15, -10, 15, 10);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, lighten(this.color, 20));
                gradient.addColorStop(1, darken(this.color, 20));
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(-12, -18, 24, 36, 5);
                ctx.fill();
                ctx.strokeStyle = darken(this.color, 40);
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.roundRect(-8, -12, 16, 10, 3);
                ctx.fill();
                ctx.fillStyle = 'rgba(100, 200, 255, 0.4)';
                ctx.fillRect(-6, -10, 12, 6);

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(0, -2, 4, 0, Math.PI, true);
                ctx.fill();

                ctx.fillStyle = '#222';
                this.drawWheel(ctx, -14, -12, this.wheelRotation);
                this.drawWheel(ctx, 10, -12, this.wheelRotation);
                this.drawWheel(ctx, -14, 12, this.wheelRotation);
                this.drawWheel(ctx, 10, 12, this.wheelRotation);

                ctx.restore();
            }

            drawWheel(ctx, x, y, rotation) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.roundRect(-4, -6, 8, 12, 2);
                ctx.fill();
                ctx.fillStyle = '#444';
                ctx.fillRect(-2, -4, 4, 8);
                ctx.restore();
            }
        }

        function lighten(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255))
                .toString(16).slice(1);
        }

        function darken(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) - amt;
            const G = (num >> 8 & 0x00FF) - amt;
            const B = (num & 0x0000FF) - amt;
            return '#' + (0x1000000 + (R > 0 ? R : 0) * 0x10000 +
                (G > 0 ? G : 0) * 0x100 +
                (B > 0 ? B : 0))
                .toString(16).slice(1);
        }

        // Initialize karts
        const karts = [];
        const kartColors = ['#e94560', '#4361ee', '#f72585', '#4cc9f0', '#7209b7', '#f77f00', '#06ffa5', '#ff006e'];
        const kartNames = ['You', 'Mario', 'Luigi', 'Peach', 'Bowser', 'Yoshi', 'Toad', 'DK'];

        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const x = 500 + Math.cos(angle) * 200;
            const y = 500 + Math.sin(angle) * 200;
            karts.push(new Kart(x, y, kartColors[i], i === 0, kartNames[i]));
        }

        const player = karts[0];

        // Input handling
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' && gameRunning) e.preventDefault();
            if (e.key === 'Escape' && gameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶️' : '⏸️';
            }
        });
        document.addEventListener('keyup', e => keys[e.key] = false);

        // Touch controls
        const steerLeft = document.getElementById('steerLeft');
        const steerRight = document.getElementById('steerRight');
        const accel = document.getElementById('accel');

        steerLeft.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchState.left = true;
            steerLeft.classList.add('active');
        });
        steerLeft.addEventListener('touchend', () => {
            touchState.left = false;
            steerLeft.classList.remove('active');
        });

        steerRight.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchState.right = true;
            steerRight.classList.add('active');
        });
        steerRight.addEventListener('touchend', () => {
            touchState.right = false;
            steerRight.classList.remove('active');
        });

        accel.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchState.up = true;
            accel.classList.add('active');
        });
        accel.addEventListener('touchend', () => {
            touchState.up = false;
            accel.classList.remove('active');
        });

        // Mouse fallback for desktop testing
        steerLeft.addEventListener('mousedown', () => { touchState.left = true; });
        steerLeft.addEventListener('mouseup', () => { touchState.left = false; });
        steerRight.addEventListener('mousedown', () => { touchState.right = true; });
        steerRight.addEventListener('mouseup', () => { touchState.right = false; });
        accel.addEventListener('mousedown', () => { touchState.up = true; });
        accel.addEventListener('mouseup', () => { touchState.up = false; });

        // Speedometer
        function drawSpeedometer() {
            speedoCanvas.width = 90;
            speedoCanvas.height = 90;
            const centerX = 45;
            const centerY = 45;
            const radius = 40;

            speedoCtx.clearRect(0, 0, 90, 90);

            speedoCtx.beginPath();
            speedoCtx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            speedoCtx.fillStyle = '#1a1a2e';
            speedoCtx.fill();
            speedoCtx.strokeStyle = '#e94560';
            speedoCtx.lineWidth = 3;
            speedoCtx.stroke();

            for (let i = 0; i <= 12; i++) {
                const angle = Math.PI * 0.75 + (Math.PI * 1.5 * i / 12);
                const x1 = centerX + Math.cos(angle) * (radius - 8);
                const y1 = centerY + Math.sin(angle) * (radius - 8);
                const x2 = centerX + Math.cos(angle) * (radius - 2);
                const y2 = centerY + Math.sin(angle) * (radius - 2);
                speedoCtx.beginPath();
                speedoCtx.moveTo(x1, y1);
                speedoCtx.lineTo(x2, y2);
                speedoCtx.strokeStyle = i > 9 ? '#f00' : '#fff';
                speedoCtx.lineWidth = 2;
                speedoCtx.stroke();
            }

            const speedPercent = Math.abs(player.speed) / player.maxSpeed;
            const needleAngle = Math.PI * 0.75 + Math.PI * 1.5 * speedPercent;
            const needleX = centerX + Math.cos(needleAngle) * (radius - 12);
            const needleY = centerY + Math.sin(needleAngle) * (radius - 12);

            speedoCtx.beginPath();
            speedoCtx.moveTo(centerX, centerY);
            speedoCtx.lineTo(needleX, needleY);
            speedoCtx.strokeStyle = '#e94560';
            speedoCtx.lineWidth = 3;
            speedoCtx.stroke();

            speedoCtx.beginPath();
            speedoCtx.arc(centerX, centerY, 4, 0, Math.PI * 2);
            speedoCtx.fillStyle = '#e94560';
            speedoCtx.fill();

            speedoCtx.fillStyle = '#fff';
            speedoCtx.font = 'bold 18px Arial';
            speedoCtx.textAlign = 'center';
            speedoCtx.fillText(Math.floor(Math.abs(player.speed) * 10), centerX, centerY + 30);
            speedoCtx.font = '8px Arial';
            speedoCtx.fillText('KM/H', centerX, centerY + 40);
        }

        // Minimap
        function drawMinimap() {
            minimapCanvas.width = 80;
            minimapCanvas.height = 80;
            const scale = 0.08;
            const offsetX = 40;
            const offsetY = 40;

            minimapCtx.fillStyle = 'rgba(0,0,0,0.5)';
            minimapCtx.fillRect(0, 0, 80, 80);

            minimapCtx.strokeStyle = '#666';
            minimapCtx.lineWidth = 6;
            minimapCtx.beginPath();
            minimapCtx.arc(offsetX, offsetY, 350 * scale, 0, Math.PI * 2);
            minimapCtx.stroke();

            minimapCtx.strokeStyle = '#228B22';
            minimapCtx.lineWidth = 20 * scale;
            minimapCtx.stroke();

            minimapCtx.strokeStyle = '#666';
            minimapCtx.lineWidth = 6;
            minimapCtx.beginPath();
            minimapCtx.arc(offsetX, offsetY, 150 * scale, 0, Math.PI * 2);
            minimapCtx.stroke();

            karts.forEach((kart, i) => {
                const x = offsetX + (kart.x - 500) * scale;
                const y = offsetY + (kart.y - 500) * scale;
                minimapCtx.fillStyle = kart.color;
                minimapCtx.beginPath();
                minimapCtx.arc(x, y, i === 0 ? 3 : 3, 0, Math.PI * 2);
                minimapCtx.fill();
                if (i === 0) {
                    minimapCtx.strokeStyle = '#fff';
                    minimapCtx.lineWidth = 1;
                    minimapCtx.stroke();
                }
            });
        }

        // Game Loop
        function gameLoop() {
            if (!gameRunning || isPaused) return;

            karts.forEach(kart => kart.update(keys));

            const sorted = [...karts].sort((a, b) => {
                if (a.lap !== b.lap) return b.lap - a.lap;
                return b.checkpointIndex - a.checkpointIndex;
            });
            const playerPos = sorted.indexOf(player) + 1;
            document.getElementById('position').textContent = playerPos;

            const elapsed = (Date.now() - startTime) / 1000;
            const mins = Math.floor(elapsed / 60);
            const secs = (elapsed % 60).toFixed(2);
            document.getElementById('time').textContent = `${mins}:${secs.padStart(5, '0')}`;

            const cameraX = player.x;
            const cameraY = player.y;

            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#2E8B57';
            for (let x = 0; x < canvas.width; x += 40) {
                for (let y = 0; y < canvas.height; y += 40) {
                    if ((x + y) % 80 === 0) {
                        ctx.fillRect(x, y, 20, 20);
                    }
                }
            }

            ctx.save();
            ctx.translate(canvas.width / 2 - cameraX + 500, canvas.height / 2 - cameraY + 500);

            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.arc(0, 0, track.outerRadius + 50, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.arc(0, 0, track.outerRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.arc(0, 0, track.innerRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.arc(0, 0, (track.innerRadius + track.outerRadius) / 2, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#fff';
            for (let i = 0; i < 10; i++) {
                ctx.fillRect(345, -10 + i * 4, 10, 2);
            }

            ctx.restore();

            track.trees.forEach(tree => {
                const screenX = tree.x - cameraX + canvas.width / 2;
                const screenY = tree.y - cameraY + canvas.height / 2;

                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(screenX + 3, screenY + tree.height / 2 + 3, 8, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#8B4513';
                ctx.fillRect(screenX - 3, screenY, 6, tree.height / 3);

                ctx.fillStyle = tree.color;
                ctx.beginPath();
                ctx.moveTo(screenX - 15, screenY + tree.height / 3);
                ctx.lineTo(screenX, screenY - tree.height / 2);
                ctx.lineTo(screenX + 15, screenY + tree.height / 3);
                ctx.fill();
            });

            const visibleKarts = karts.filter(kart => {
                const screenX = kart.x - cameraX + canvas.width / 2;
                const screenY = kart.y - cameraY + canvas.height / 2;
                return screenX > -50 && screenX < canvas.width + 50 &&
                       screenY > -50 && screenY < canvas.height + 50;
            });

            visibleKarts.sort((a, b) => a.y - b.y);
            visibleKarts.forEach(kart => kart.draw(ctx, cameraX, cameraY));

            drawSpeedometer();
            drawMinimap();

            if (playerPos === 1 && player.lap === 3) {
                isPaused = true;
                document.getElementById('driftHint').textContent = `🏆 YOU WIN! 🏆`;
                document.getElementById('driftHint').classList.add('visible');
                document.getElementById('driftHint').style.display = 'block';
            }

            requestAnimationFrame(gameLoop);
        }

        // Start game
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            startTime = Date.now();
            gameLoop();
        });

        // Pause button
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (!gameRunning) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶️' : '⏸️';
            if (!isPaused) gameLoop();
        });

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
